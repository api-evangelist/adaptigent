description: >-
  Adaptigent (formerly GT Software) is a technology company founded in 1982
  that specializes in mainframe integration and API enablement solutions. Their
  flagship product, Adaptive Integration Fabric (formerly Ivory Suite), empowers
  enterprises to expose legacy mainframe systems as modern REST and SOAP APIs
  without writing any code. Using a patented no-code, drag-and-drop environment,
  the platform enables integration of IBM z/OS and z/VSE mainframe applications
  with modern distributed systems, supporting both inbound and outbound
  integration flows in real time. Adaptigent serves industries including
  finance, government, manufacturing, and healthcare, offering a usage-based
  subscription pricing model.
apis:
  - aid: adaptigent:adaptive-integration-fabric
    name: Adaptive Integration Fabric API
    tags:
      - Mainframe
      - Integration
      - REST API
      - SOAP
      - No Code
    humanURL: https://www.adaptigent.com/products/core-systems-integration/
    description: >-
      The Adaptive Integration Fabric (formerly Ivory Suite) enables enterprises
      to rapidly expose IBM z/OS and z/VSE mainframe applications as REST or SOAP
      web services without programming. Using the Fabric Studio drag-and-drop
      interface, users design integration flows that become deployed as API
      endpoints through the Fabric Runtime. Supports both inbound API calls into
      the mainframe and outbound API calls from mainframe COBOL and PL/I programs
      to external REST or SOAP services. Available on Red Hat Marketplace.
    properties:
      - type: Documentation
        url: https://www.adaptigent.com/products/core-systems-integration/
      - type: GettingStarted
        url: https://www.adaptigent.com/project/api-enabling-your-mainframe-with-adaptigent/
