  - type: Features
    data:
      - name: No-Code API Development
        description: >-
          Patented drag-and-drop visual environment enables non-programmers to
          create sophisticated REST and SOAP APIs from mainframe applications
          without writing any code.
      - name: Inbound And Outbound Integration
        description: >-
          Supports bidirectional integration flows — modern applications can call
          mainframe services via API, and COBOL/PL/I mainframe programs can make
          outbound calls to external REST or SOAP services.
      - name: Real-Time Mainframe Data Access
        description: >-
          Provides real-time access to legacy data sources and transaction
          systems, enabling modern applications to consume mainframe data
          instantly without batch processing.
      - name: IBM z/OS And z/VSE Support
        description: >-
          Natively supports IBM z/OS and z/VSE mainframe platforms, enabling
          REST API enablement for COBOL and PL/I programs on these systems.
      - name: REST And SOAP API Generation
        description: >-
          Automatically generates industry-standard REST and SOAP web service
          endpoints from mainframe subroutines and programs, with no additional
          MIPS usage.
      - name: Usage-Based Subscription Pricing
        description: >-
          Flexible pricing model based on actual resource consumption, allowing
          organizations to scale integration usage without fixed licensing fees.
      - name: Red Hat Marketplace Availability
        description: >-
          Available on Red Hat Marketplace, enabling enterprise customers to
          deploy and manage Adaptive Integration Fabric within their Red Hat
          OpenShift environments.
  - type: UseCases
    data:
      - name: Mainframe API Modernization
        description: >-
          Enterprises with legacy IBM mainframe systems can expose core business
          logic and data as modern REST APIs, enabling mobile apps, web
          applications, and microservices to consume mainframe capabilities.
      - name: Financial Core System Integration
        description: >-
          Banks and financial institutions can connect core banking systems on
          the mainframe to fraud detection services, digital banking platforms,
          and fintech APIs in real time.
      - name: Government Legacy System Modernization
        description: >-
          Government agencies can modernize access to mission-critical legacy
          systems by exposing them as standard APIs without replacing or
          re-coding existing mainframe applications.
      - name: Manufacturing Supply Chain Integration
        description: >-
          Manufacturers can link inventory, transportation, and parts systems
          running on legacy platforms with modern ERP and supply chain
          management systems through API integration.
      - name: Hybrid Cloud Mainframe Connectivity
        description: >-
          Organizations adopting hybrid cloud strategies can bridge on-premises
          mainframe data with cloud-based applications and services using
          Adaptive Integration Fabric as the middleware layer.
  - type: Integrations
    data:
      - name: IBM z/OS
        description: Native integration with IBM z/OS mainframe operating system.
      - name: IBM z/VSE
        description: Native integration with IBM z/VSE mainframe operating system.
      - name: Red Hat OpenShift
        description: Available on Red Hat Marketplace for deployment in OpenShift environments.
      - name: REST APIs
        description: >-
          Consumes and produces standard REST APIs for integration with modern
          distributed systems.
      - name: SOAP Web Services
        description: >-
          Generates SOAP web service endpoints from mainframe programs for
          compatibility with enterprise service-oriented architecture.
  - type: Integrations
    url: https://www.adaptigent.com/about/partners/
